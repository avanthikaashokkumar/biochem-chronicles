<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 828 360" role="img" aria-labelledby="title desc">
<title id="title">Portable Air Quality Monitor</title>
<desc id="desc">A compact project flow diagram showing the main setup for Portable Air Quality Monitor.</desc>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#6d7d7a"/></marker>
<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#102522" flood-opacity="0.12"/></filter>
</defs>
<rect width="828" height="360" rx="30" fill="#f7fbfa"/>
<path d="M22 290 C148 238 211 326 346 278 C456 238 527 286 638 254 C711 233 765 246 806 228" fill="none" stroke="#dfe8e5" stroke-width="16" stroke-linecap="round"/>
<text x="414" y="48" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#102522">Portable Air Quality Monitor</text>
<text x="414" y="75" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#526360">simple build flow, from input to output</text>
<rect x="80" y="112" width="138" height="92" rx="20" fill="#ffffff" stroke="#0a4f47" stroke-width="2.5" filter="url(#softShadow)"/>
<circle cx="108" cy="138" r="11" fill="#0a4f47" opacity="0.92"/>
<text x="149" y="160" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#102522">Air sample</text>
<text x="149" y="186" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#526360">step 1</text>
<path d="M223 158 C246 158 240 158 262 158" fill="none" stroke="#6d7d7a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="270" y="112" width="138" height="92" rx="20" fill="#ffffff" stroke="#35618c" stroke-width="2.5" filter="url(#softShadow)"/>
<circle cx="298" cy="138" r="11" fill="#35618c" opacity="0.92"/>
<text x="339" y="160" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#102522">MQ sensors</text>
<text x="339" y="186" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#526360">step 2</text>
<path d="M413 158 C436 158 430 158 452 158" fill="none" stroke="#6d7d7a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="460" y="112" width="138" height="92" rx="20" fill="#ffffff" stroke="#8477b3" stroke-width="2.5" filter="url(#softShadow)"/>
<circle cx="488" cy="138" r="11" fill="#8477b3" opacity="0.92"/>
<text x="529" y="152" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#102522">Arduino reads</text>
<text x="529" y="174" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#102522">values</text>
<text x="529" y="186" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#526360">step 3</text>
<path d="M603 158 C626 158 620 158 642 158" fill="none" stroke="#6d7d7a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="650" y="112" width="138" height="92" rx="20" fill="#ffffff" stroke="#1f7a5c" stroke-width="2.5" filter="url(#softShadow)"/>
<circle cx="678" cy="138" r="11" fill="#1f7a5c" opacity="0.92"/>
<text x="719" y="160" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#102522">Display or alert</text>
<text x="719" y="186" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#526360">step 4</text>
<g>
<circle cx="174" cy="270" r="42" fill="#e4f1ee" stroke="#cbd8d5" stroke-width="2"/>
<text x="174" y="266" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#0a4f47">warm up</text>
<text x="174" y="282" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#0a4f47">sensors</text>
</g>
<g>
<circle cx="414" cy="270" r="42" fill="#e4f1ee" stroke="#cbd8d5" stroke-width="2"/>
<text x="414" y="266" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#0a4f47">calibrate baseline</text>
<text x="414" y="282" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#0a4f47"></text>
</g>
<g>
<circle cx="654" cy="270" r="42" fill="#e4f1ee" stroke="#cbd8d5" stroke-width="2"/>
<text x="654" y="266" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#0a4f47">treat readings</text>
<text x="654" y="282" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#0a4f47">as approximate</text>
</g>
</svg>
